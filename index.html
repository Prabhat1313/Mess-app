
<!DOCTYPE html>
<html>
<head>
  <title>Mess App</title>
</head>
<body>

<h2>Mess App</h2>

<input id="name" placeholder="Mess Name"><br>
<input id="district" placeholder="District"><br>
<input id="price" placeholder="Price"><br>

<button onclick="addMess()">Save</button>

<h3>Mess List</h3>
<div id="list"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "PASTE_YOURS",
  authDomain: "PASTE_YOURS",
  projectId: "PASTE_YOURS"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function addMess() {
  db.collection("mess").add({
    name: document.getElementById("name").value,
    district: document.getElementById("district").value,
    price: document.getElementById("price").value
  }).then(() => {
    alert("Saved ✅");
    loadData();
  });
}

function loadData() {
  db.collection("mess").get().then(snapshot => {
    let html = "";
    snapshot.forEach(doc => {
      let d = doc.data();
      html += `<p>${d.name} - ${d.district} - ₹${d.price}</p>`;
    });
    document.getElementById("list").innerHTML = html;
  });
}

loadData();
</script>

</body>
</html>
